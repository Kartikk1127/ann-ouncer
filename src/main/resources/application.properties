# Anthropic API Configuration
anthropic.api.key=api key here
anthropic.model=claude-sonnet-4-20250514
anthropic.max.tokens=4096

# Slack Configuration
slack.bot.token=bot key here
slack.app.token=YOUR_SLACK_APP_TOKEN_HERE
slack.channel.tech=vector-llm-updates
slack.channel.market=skills-trending

# GitHub Configuration
github.token=YOUR_GITHUB_TOKEN_HERE
github.repos=jbellis/jvector,facebookresearch/faiss,milvus-io/milvus,qdrant/qdrant,weaviate/weaviate,lancedb/lancedb

# Reddit Configuration
reddit.client.id=YOUR_REDDIT_CLIENT_ID
reddit.client.secret=YOUR_REDDIT_CLIENT_SECRET
reddit.subreddits=MachineLearning,LocalLLaMA

# Monitoring Configuration
monitor.batch.hour=12
monitor.poll.interval.hours=1
monitor.thread.pool.size=5
monitor.replay.hours=24

# State File Paths
state.dir=./state
state.processed.items=processed_items.json
state.user.feedback=user_feedback.json
state.source.state=source_state.json

# Keywords for filtering
keywords.vector=vector,embedding,HNSW,FAISS,Milvus,Qdrant,Weaviate,similarity search,approximate nearest neighbor,ANN
keywords.llm=LLM,GPT,transformer,attention,BERT,language model,fine-tuning,prompt engineering,RAG
keywords.ml=machine learning,deep learning,neural network,pytorch,tensorflow,gradient descent,backpropagation
keywords.infra=distributed systems,consensus,raft,paxos,replication,sharding,partitioning
